services:
  db:
    image: postgres:16-alpine
    container_name: persona_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: persona_interview
      POSTGRES_USER: persona_user
      POSTGRES_PASSWORD: persona_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U persona_user -d persona_interview"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: persona_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@persona.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
